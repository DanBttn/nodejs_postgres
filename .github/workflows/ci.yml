name: Pipeline CI/CD

on:
  push:
    branches:
      - main 

jobs: 
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: root         
          POSTGRES_PASSWORD: root     
          POSTGRES_DB: github-actions 
          
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run build --if-present
      
      - run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: github-actions